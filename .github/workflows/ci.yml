name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test-worker:
    name: Worker Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test

  lint-and-test-agent:
    name: Agent Lint & Test
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: agent/go.sum
      - run: go vet ./...
      - run: go test ./...

  integration-test:
    name: Agent Integration Test (ARM64)
    runs-on: ubuntu-24.04-arm
    needs: [lint-and-test-agent]
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: agent/go.sum
      - name: Build agent
        run: go build -o homenfv-agent ./cmd/agent/
      - name: Start agent
        run: |
          export HOMENFV_LISTEN_ADDR=127.0.0.1:8787
          export HOMENFV_STORAGE_ROOT=$(mktemp -d)
          ./homenfv-agent &
          sleep 2
      - name: Verify health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8787/health)
          echo "Health check status: $STATUS"
          [ "$STATUS" = "200" ]
      - name: Run integration tests
        run: go test -tags=integration ./...
