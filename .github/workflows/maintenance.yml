name: Scheduled Maintenance

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Task to run"
        required: true
        type: choice
        options:
          - cache-cleanup
          - db-backup
          - security-audit

jobs:
  cache-cleanup:
    name: R2 Cache Cleanup
    runs-on: ubuntu-latest
    if: inputs.task == 'cache-cleanup'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: cd worker && npm ci
      - name: Clean stale cache
        run: cd worker && node scripts/cache-cleanup.js
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET_NAME: homenfv-cache
          D1_DATABASE_ID: ${{ vars.D1_DATABASE_ID }}

  db-backup:
    name: D1 Backup
    runs-on: ubuntu-latest
    if: inputs.task == 'db-backup'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: cd worker && npm ci
      - name: Export D1
        run: cd worker && npx wrangler d1 export homenfv-db --remote --output=../backup.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Upload backup
        uses: actions/upload-artifact@v4
        with:
          name: d1-backup-${{ github.run_number }}
          path: backup.sql
          retention-days: 30

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    if: inputs.task == 'security-audit'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Audit Worker
        run: cd worker && npm audit
        continue-on-error: true
      - name: Audit Agent
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd agent && govulncheck ./...
        continue-on-error: true
