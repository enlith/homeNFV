name: Health Check

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      worker_url:
        description: "Override Worker URL (e.g. demo URL). Leave empty to use WORKER_DOMAIN variable."
        required: false
        type: string

jobs:
  check:
    name: Ping Worker
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          if [ -n "${{ inputs.worker_url }}" ]; then
            URL="${{ inputs.worker_url }}"
          else
            URL="https://${{ vars.WORKER_DOMAIN }}"
          fi

          echo "Checking: ${URL}/api/health"
          for i in $(seq 1 5); do
            STATUS=$(curl -s -o /tmp/health.txt -w "%{http_code}" "${URL}/api/health" || echo "000")
            RESPONSE=$(cat /tmp/health.txt 2>/dev/null || echo "connection failed")
            echo "Attempt $i — HTTP $STATUS: $RESPONSE"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Worker is healthy"
              exit 0
            fi
            sleep 10
          done
          echo "::warning::Health check failed after 5 attempts (last status: $STATUS)"
          exit 1
