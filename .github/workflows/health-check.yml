name: Health Check

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      worker_url:
        description: "Override Worker URL (e.g. demo URL). Leave empty to use WORKER_DOMAIN variable."
        required: false
        type: string

jobs:
  check:
    name: Ping Worker
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          if [ -n "${{ inputs.worker_url }}" ]; then
            URL="${{ inputs.worker_url }}"
          else
            URL="https://${{ vars.WORKER_DOMAIN }}"
          fi

          echo "Checking: ${URL}/api/health"
          RESPONSE=$(curl -s "${URL}/api/health" || echo "connection failed")
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/api/health" || echo "000")

          echo "HTTP Status: $STATUS"
          echo "Response: $RESPONSE"

          if [ "$STATUS" != "200" ]; then
            echo "::warning::Health check failed with status $STATUS"
            exit 1
          fi
          echo "✅ Worker is healthy"
