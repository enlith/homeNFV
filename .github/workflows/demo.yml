name: Demo Environment

on:
  workflow_dispatch:
    inputs:
      duration:
        description: "How long to keep the demo running (minutes)"
        required: true
        type: choice
        default: "30"
        options:
          - "30"
          - "60"
          - "180"
          - "300"
      admin_username:
        description: "Admin username"
        required: true
        default: "admin"
        type: string
      admin_password:
        description: "Admin account password (min 8 chars)"
        required: true
        type: string
      disable_registration:
        description: "Disable public registration (only admin can login)"
        required: true
        type: boolean
        default: true

jobs:
  deploy-demo:
    name: Deploy Demo
    runs-on: ubuntu-latest
    timeout-minutes: 330
    environment: demo
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /opt/hostedtoolcache
          sudo apt-get clean
          df -h /

      # --- Setup tools ---
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: cd worker && npm ci

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      # --- Create Cloudflare resources ---
      - name: Create demo resources
        id: resources
        run: |
          DEMO_ID="demo-$(date +%s)"
          echo "demo_id=$DEMO_ID" >> "$GITHUB_OUTPUT"

          # Create KV namespace
          KV_OUT=$(cd worker && npx wrangler kv namespace create "${DEMO_ID}-kv" 2>&1)
          KV_ID=$(echo "$KV_OUT" | grep -oP 'id = "\K[^"]+')
          echo "kv_id=$KV_ID" >> "$GITHUB_OUTPUT"

          # Create D1 database
          D1_OUT=$(cd worker && npx wrangler d1 create "${DEMO_ID}-db" 2>&1)
          D1_ID=$(echo "$D1_OUT" | grep -oP 'database_id = \K\S+' | tr -d '"')
          echo "d1_id=$D1_ID" >> "$GITHUB_OUTPUT"

          # Create R2 bucket
          cd worker && npx wrangler r2 bucket create "${DEMO_ID}-cache" 2>&1 || true

          echo "Demo ID: $DEMO_ID"
          echo "KV: $KV_ID"
          echo "D1: $D1_ID"

      - name: Apply D1 schema
        run: |
          for f in worker/migrations/*.sql; do
            SQL=$(cat "$f")
            PAYLOAD=$(jq -n --arg sql "$SQL" '{sql: $sql}')
            curl -sf -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/d1/database/${{ steps.resources.outputs.d1_id }}/query" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD"
            echo ""
            echo "Applied: $f"
          done

      # --- Build and start agent ---
      - name: Build agent
        run: cd agent && go mod tidy && go build -o homenfv-agent ./cmd/agent/

      - name: Start agent
        id: agent
        run: |
          AGENT_SECRET=$(openssl rand -hex 32)
          echo "agent_secret=$AGENT_SECRET" >> "$GITHUB_OUTPUT"

          STORAGE_ROOT=$(mktemp -d)
          echo "storage_root=$STORAGE_ROOT" >> "$GITHUB_OUTPUT"

          export HOMENFV_LISTEN_ADDR=127.0.0.1:8787
          export HOMENFV_SHARED_SECRET=$AGENT_SECRET
          export HOMENFV_STORAGE_ROOT=$STORAGE_ROOT
          cd agent && ./homenfv-agent 2>&1 &

          # Wait for agent to be ready
          for i in $(seq 1 10); do
            if curl -sf http://127.0.0.1:8787/health > /dev/null 2>&1; then
              echo "Agent is ready"
              break
            fi
            sleep 1
          done

      # --- Start cloudflared tunnel to expose agent ---
      - name: Start tunnel
        id: tunnel
        run: |
          # Use cloudflared quick tunnel (no account needed, gives a trycloudflare.com URL)
          cloudflared tunnel --url http://127.0.0.1:8787 --no-autoupdate > /tmp/cloudflared.log 2>&1 &
          TUNNEL_PID=$!
          echo "tunnel_pid=$TUNNEL_PID" >> "$GITHUB_OUTPUT"

          # Wait for tunnel URL
          for i in $(seq 1 30); do
            TUNNEL_URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/cloudflared.log | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              echo "Tunnel URL: $TUNNEL_URL"
              echo "tunnel_url=$TUNNEL_URL" >> "$GITHUB_OUTPUT"
              break
            fi
            sleep 2
          done

          if [ -z "$TUNNEL_URL" ]; then
            echo "Failed to get tunnel URL"
            cat /tmp/cloudflared.log
            exit 1
          fi

      # --- Deploy Worker pointing to tunnel ---
      - name: Generate demo wrangler.toml
        run: |
          cat > worker/wrangler.demo.toml << EOF
          name = "homenfv-demo-${{ steps.resources.outputs.demo_id }}"
          main = "src/index.ts"
          compatibility_date = "2024-12-01"

          [vars]
          AGENT_URL = "${{ steps.tunnel.outputs.tunnel_url }}"

          [[kv_namespaces]]
          binding = "KV"
          id = "${{ steps.resources.outputs.kv_id }}"

          [[r2_buckets]]
          binding = "R2"
          bucket_name = "${{ steps.resources.outputs.demo_id }}-cache"

          [[d1_databases]]
          binding = "DB"
          database_name = "${{ steps.resources.outputs.demo_id }}-db"
          database_id = "${{ steps.resources.outputs.d1_id }}"
          EOF

      - name: Deploy demo worker
        id: deploy
        run: |
          cd worker
          JWT_SECRET=$(openssl rand -hex 32)

          DEPLOY_OUT=$(npx wrangler deploy \
            --config wrangler.demo.toml \
            --var JWT_SECRET:${JWT_SECRET} \
            --var AGENT_SHARED_SECRET:${{ steps.agent.outputs.agent_secret }} 2>&1)
          echo "$DEPLOY_OUT"

          # Extract workers.dev URL (try multiple patterns)
          DEMO_URL=$(echo "$DEPLOY_OUT" | grep -oE 'https://[^ ]+\.workers\.dev' | head -1)
          if [ -z "$DEMO_URL" ]; then
            echo "ERROR: Could not extract demo URL from deploy output"
            exit 1
          fi
          echo "Demo URL: $DEMO_URL"
          echo "demo_url=$DEMO_URL" >> "$GITHUB_OUTPUT"
          echo "jwt_secret=$JWT_SECRET" >> "$GITHUB_OUTPUT"

      # --- Seed admin and start sync loop ---
      - name: Mask secrets
        run: echo "::add-mask::${{ inputs.admin_password }}"
        shell: bash

      - name: Seed admin user
        run: |
          cd worker
          DEMO_URL="${{ steps.deploy.outputs.demo_url }}"
          KV_ID="${{ steps.resources.outputs.kv_id }}"

          echo "Seeding admin via API: $DEMO_URL"

          # Wait for Worker to be reachable
          for i in $(seq 1 20); do
            HEALTH=$(curl -s "${DEMO_URL}/api/health" 2>&1)
            echo "  health attempt $i: $HEALTH"
            if echo "$HEALTH" | grep -q '"ok"'; then
              echo "Worker is ready"
              break
            fi
            sleep 3
          done

          # Register admin via API
          PAYLOAD=$(jq -n --arg u "${{ inputs.admin_username }}" --arg p "${{ inputs.admin_password }}" \
            '{username: $u, password: $p}')

          HTTP_CODE=$(curl -s -o /tmp/register_response.txt -w "%{http_code}" \
            -X POST "${DEMO_URL}/api/auth/register" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          BODY=$(cat /tmp/register_response.txt)
          echo "HTTP $HTTP_CODE: $BODY"

          if [ "$HTTP_CODE" != "201" ]; then
            echo "WARNING: API registration returned $HTTP_CODE, trying direct KV write..."
            # Fallback: write admin user directly to KV via wrangler
            SALT=$(openssl rand -hex 16)
            # Use node to hash the password with PBKDF2 matching our auth.ts
            HASH=$(node -e "
              const crypto = require('crypto');
              const salt = Buffer.from('$SALT', 'hex');
              crypto.pbkdf2('${{ inputs.admin_password }}', salt, 100000, 32, 'sha256', (err, key) => {
                console.log('$SALT:' + key.toString('hex'));
              });
            ")
            USER_ID=$(node -e "console.log(require('crypto').randomUUID())")
            USER_JSON=$(jq -n \
              --arg id "$USER_ID" \
              --arg u "${{ inputs.admin_username }}" \
              --arg h "$HASH" \
              '{id: $id, username: $u, passwordHash: $h, role: "admin", status: "active", createdAt: (now * 1000 | floor)}')
            npx wrangler kv key put --namespace-id="$KV_ID" "user:${{ inputs.admin_username }}" "$USER_JSON" 
            npx wrangler kv key put --namespace-id="$KV_ID" "user_id:$USER_ID" "${{ inputs.admin_username }}" 
            npx wrangler kv key put --namespace-id="$KV_ID" "meta:user_count" "1" 
            echo "Admin user written directly to KV"
          fi

      - name: Lock down demo
        if: inputs.disable_registration == true
        run: |
          cd worker
          # Redeploy with registration disabled
          npx wrangler deploy \
            --config wrangler.demo.toml \
            --var JWT_SECRET:${{ steps.deploy.outputs.jwt_secret }} \
            --var AGENT_SHARED_SECRET:${{ steps.agent.outputs.agent_secret }} \
            --var DISABLE_REGISTRATION:true 2>&1
          echo "Registration disabled — only seeded admin can use the demo"

      - name: Start agent sync loop
        run: |
          # Set worker URL for sync and restart agent with it
          kill $(pgrep homenfv-agent) 2>/dev/null || true
          sleep 1

          export HOMENFV_LISTEN_ADDR=127.0.0.1:8787
          export HOMENFV_SHARED_SECRET=${{ steps.agent.outputs.agent_secret }}
          export HOMENFV_STORAGE_ROOT=${{ steps.agent.outputs.storage_root }}
          export HOMENFV_WORKER_URL=${{ steps.deploy.outputs.demo_url }}
          cd agent && ./homenfv-agent 2>&1 &
          sleep 2
          echo "Agent restarted with sync loop"

      - name: Print demo info
        run: |
          echo "============================================"
          echo "  🚀 DEMO ENVIRONMENT READY"
          echo "============================================"
          echo ""
          echo "  URL:      ${{ steps.deploy.outputs.demo_url }}"
          echo "  Username: ${{ inputs.admin_username }}"
          echo "  Duration: ${{ inputs.duration }} minutes"
          echo "  Demo ID:  ${{ steps.resources.outputs.demo_id }}"
          echo "  Agent:    Running on GitHub runner via tunnel"
          echo "  Storage:  ${{ steps.agent.outputs.storage_root }}"
          echo ""
          echo "  Full functionality — upload, browse, download,"
          echo "  sync, and caching all active."
          echo "============================================"

      - name: Wait for demo duration
        run: |
          STORAGE="${{ steps.agent.outputs.storage_root }}"
          DURATION=$(( ${{ inputs.duration }} * 60 ))
          ELAPSED=0
          INTERVAL=30

          echo "Demo running for ${{ inputs.duration }} minutes..."
          echo "Agent storage: $STORAGE"
          echo ""

          while [ $ELAPSED -lt $DURATION ]; do
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
            REMAINING=$(( (DURATION - ELAPSED) / 60 ))

            echo "--- ${REMAINING}m remaining | Agent storage contents: ---"
            find "$STORAGE" -type f -printf '%s\t%p\n' 2>/dev/null | sort || echo "(empty)"
            echo ""
          done

      # --- Teardown (runs on finish, cancel, or failure) ---
      - name: Teardown demo
        if: always()
        run: |
          cd worker
          DEMO_ID="${{ steps.resources.outputs.demo_id }}"
          echo "Tearing down demo..."

          # Stop agent and tunnel
          kill $(pgrep homenfv-agent) 2>/dev/null || true
          kill ${{ steps.tunnel.outputs.tunnel_pid }} 2>/dev/null || true

          # Delete worker
          if [ -f wrangler.demo.toml ]; then
            npx wrangler delete --config wrangler.demo.toml --force 2>&1 || true
          fi

          # Delete KV namespace
          KV_ID="${{ steps.resources.outputs.kv_id }}"
          if [ -n "$KV_ID" ]; then
            npx wrangler kv namespace delete --namespace-id="$KV_ID" 2>&1 || true
          fi

          # Delete D1 database
          if [ -n "$DEMO_ID" ]; then
            npx wrangler d1 delete "${DEMO_ID}-db" -y 2>&1 || true
          fi

          # Empty and delete R2 bucket
          if [ -n "$DEMO_ID" ]; then
            # List and delete all objects first
            OBJECTS=$(npx wrangler r2 object list "${DEMO_ID}-cache" 2>&1 | grep -oP '"key"\s*:\s*"\K[^"]+' || true)
            for obj in $OBJECTS; do
              npx wrangler r2 object delete "${DEMO_ID}-cache/$obj" 2>&1 || true
            done
            npx wrangler r2 bucket delete "${DEMO_ID}-cache" 2>&1 || true
          fi

          echo "Demo teardown complete — all Cloudflare resources deleted."
