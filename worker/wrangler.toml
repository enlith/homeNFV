name = "homenfv-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
AGENT_URL = "http://localhost:8787"

[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[[r2_buckets]]
binding = "R2"
bucket_name = "homenfv-cache"

[[d1_databases]]
binding = "DB"
database_name = "homenfv-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "migrations"
